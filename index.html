<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業 37 - 圓形計算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            width: 100%;
            max-width: 450px;
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: #1f2937;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4b5563;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2563eb;
        }

        .results {
            margin-top: 25px;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }

        .result-title {
            font-size: 15px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 10px;
        }

        .result-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            color: #1f2937;
            white-space: pre-wrap;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>作業 37 - 圓形計算器</h1>

        <div class="input-group">
            <label for="radius">輸入圓的半徑 (Radius)：</label>
            <input type="number" id="radius" value="10" min="0" placeholder="請輸入半徑">
        </div>

        <button onclick="runCalculations()">計算</button>

        <div class="results">
            <div class="result-title">輸出結果：</div>
            <div id="output" class="result-box">點擊上方按鈕以計算...</div>
        </div>
    </div>

    <script>
        //第一個函數：calcCircumfrence
        function calcCircumfrence(radius) {
            const circumference = 2 * Math.PI * radius;
            const formatted = parseFloat(circumference.toFixed(2));
            const result = `The circumference is ${formatted}`;
            console.log(result);
            return result;
        }

        // 第二個函數：calcArea
        function calcArea(radius) {
            const area = Math.PI * Math.pow(radius, 2);
            const formatted = parseFloat(area.toFixed(2));
            const result = `The area is ${formatted}`;
            console.log(result);
            return result;
        }

        // 輔助
        function runCalculations() {
            const radiusInput = document.getElementById('radius');
            const radius = parseFloat(radiusInput.value);

            if (isNaN(radius) || radius < 0) {
                document.getElementById('output').textContent = '請輸入大於或等於 0 的有效半徑數值。';
                return;
            }

            // 呼叫規定的函數
            const circumferenceResult = calcCircumfrence(radius);
            const areaResult = calcArea(radius);

            // 更新網頁介面上的輸出
            document.getElementById('output').textContent =
                `${circumferenceResult}\n${areaResult}`;
        }
    </script>
</body>

</html>
